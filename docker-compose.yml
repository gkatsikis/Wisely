services:
  db:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wisely}
      - POSTGRES_USER=${POSTGRES_USER:-wisely}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wisely}
    ports:
      # host 5433 -> container 5432, so it doesn't clash with a host Postgres on 5432
      - "5433:5432"

  backend:
    build: ./backend
    command: uv run --no-sync python manage.py runserver 0.0.0.0:8000
    working_dir: /code/wisely_api
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DEBUG=${DEBUG:-1}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-wisely}
      - POSTGRES_USER=${POSTGRES_USER:-wisely}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wisely}
      - DB_HOST=db
      - DB_PORT=5432
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-}
      - BOOK_COVER_POLICY=${BOOK_COVER_POLICY:-auto}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}

  frontend:
    build: ./frontend
    command: npm run dev -- -H 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules  # keep the image's node_modules (don't shadow with the host)
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Next dev reads frontend/.env.local (bind-mounted) for NEXT_PUBLIC_* values. The browser
      # reaches the backend at localhost:8000 (host port), not over the compose network.
      - WATCHPACK_POLLING=true  # poll for file changes (more reliable for hot-reload in Docker)

volumes:
  postgres-data:
