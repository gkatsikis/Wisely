services:
  web:
    build: .
    command: uv run --no-sync python manage.py runserver 0.0.0.0:8000
    working_dir: /code/wisely_api
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DEBUG=${DEBUG:-1}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key-change-me}
      - POSTGRES_DB=${POSTGRES_DB:-wisely}
      - POSTGRES_USER=${POSTGRES_USER:-wisely}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wisely}
      - DB_HOST=db
      - DB_PORT=5432
  db:
    image: postgres:16
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wisely}
      - POSTGRES_USER=${POSTGRES_USER:-wisely}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wisely}
    ports:
      - "5432:5432"

volumes:
  postgres-data:
